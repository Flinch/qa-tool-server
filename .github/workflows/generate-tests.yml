name: Generate Automated Tests

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Correlation ID linking this run back to a pending generation_runs row'
        required: true
        type: string

permissions:
  contents: write # needed to push the generated-tests branch
  pull-requests: write # needed to open the PR

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Claude Code's workspace-trust gate normally needs an interactive
      # dialog accepted once per path. Confirmed by testing a fresh,
      # never-trusted directory locally: even with --permission-mode dontAsk,
      # an untrusted workspace silently ignores .claude/settings.json's tool
      # allowlist and denies tools like Write outright. A CI runner is a
      # fresh checkout every run — always "never trusted" — so trust has to
      # be established here, non-interactively, before any subagent call.
      - name: Trust this workspace for Claude Code
        run: |
          node -e "
            const fs = require('fs');
            const file = process.env.HOME + '/.claude.json';
            const config = fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, 'utf-8')) : {};
            config.projects = config.projects || {};
            config.projects[process.env.GITHUB_WORKSPACE] = {
              ...(config.projects[process.env.GITHUB_WORKSPACE] || {}),
              hasTrustDialogAccepted: true,
            };
            fs.writeFileSync(file, JSON.stringify(config));
          "

      # The planner/generator agents start from the same authenticated state
      # as the `generated` Playwright project (storageState). Locally this
      # file was already on disk from prior runs; a fresh CI checkout never
      # has it, so it has to be created before any agent touches the app.
      - name: Authenticate (create storageState)
        run: npx playwright test --project=setup

      - name: Fetch generation payload
        env:
          CORRELATION_ID: ${{ inputs.correlation_id }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node .github/scripts/fetch-generation-payload.js

      - name: Generate and heal tests
        env:
          CORRELATION_ID: ${{ inputs.correlation_id }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GENERATION_COST_CAP_USD: ${{ vars.GENERATION_COST_CAP_USD || '5' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-tests.js

      # Only reached if the step above exited 0 (at least one TC generated).
      # A hard failure (nothing generated, cost cap exceeded, payload fetch
      # failed) already self-reported 'failed' from within the scripts above
      # and stops the job here — no PR gets opened for a run that produced
      # nothing.
      - name: Open PR with generated tests
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: generated-tests/${{ inputs.correlation_id }}
          title: "Generated tests: ${{ inputs.correlation_id }}"
          commit-message: "Add generated Playwright tests"
          add-paths: |
            specs/*.md
            tests/generated/**
          body: |
            Automatically generated by the test-generation pipeline (correlation id `${{ inputs.correlation_id }}`).

            Review carefully before merging — this includes any `test.fixme()` + `POSSIBLE REGRESSION` flags the healer left, which mean the app's behavior may have changed rather than the test being wrong.

      # Only this step (not generate-tests.js) knows the real PR URL, since
      # it only exists after the step above runs.
      - name: Report completion
        env:
          CORRELATION_ID: ${{ inputs.correlation_id }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          BRANCH_NAME: generated-tests/${{ inputs.correlation_id }}
        run: node .github/scripts/report-generation-complete.js
