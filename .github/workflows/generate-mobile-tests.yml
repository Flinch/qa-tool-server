name: Generate Mobile Tests

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Correlation ID linking this run back to a pending generation_runs row'
        required: true
        type: string

permissions:
  contents: write # needed to push the generated-tests branch
  pull-requests: write # needed to open the PR

jobs:
  generate:
    # Self-hosted, not ubuntu-latest: generation needs a live, low-latency
    # connection to a real device for the planner/generator/healer agents'
    # inspect_screen/run loop — a cloud device farm (AWS Device Farm, Maestro
    # Cloud) is built for running an already-finished flow, not for an AI to
    # interactively poke around mid-authoring. See DECISIONS.md, Phase 6.
    runs-on: [self-hosted, mobile]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # This machine already has Java/Maestro CLI/adb installed (see
      # DECISIONS.md, Phase 6 round 1) — a self-hosted runner's service
      # environment isn't guaranteed to inherit an interactive shell's PATH
      # the same way this whole initiative needed explicit exports for every
      # `maestro`/`adb` call. Appending to GITHUB_PATH persists it for every
      # later step in this job.
      - name: Add Maestro/Java to PATH
        run: |
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/opt/openjdk/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Confirm a device is connected
        run: |
          adb devices -l
          maestro --version

      # Same reasoning as generate-tests.yml's identical step: a fresh CI
      # checkout is always an untrusted workspace, and --permission-mode
      # dontAsk silently denies tools like Write in one without this.
      - name: Trust this workspace for Claude Code
        run: |
          node -e "
            const fs = require('fs');
            const file = process.env.HOME + '/.claude.json';
            const config = fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, 'utf-8')) : {};
            config.projects = config.projects || {};
            config.projects[process.env.GITHUB_WORKSPACE] = {
              ...(config.projects[process.env.GITHUB_WORKSPACE] || {}),
              hasTrustDialogAccepted: true,
            };
            fs.writeFileSync(file, JSON.stringify(config));
          "

      - name: Fetch generation payload
        env:
          CORRELATION_ID: ${{ inputs.correlation_id }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node .github/scripts/fetch-generation-payload.js

      - name: Generate and heal tests
        env:
          CORRELATION_ID: ${{ inputs.correlation_id }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GENERATION_COST_CAP_USD: ${{ vars.GENERATION_COST_CAP_USD || '5' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-mobile-tests.js

      - name: Open PR with generated tests
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: generated-mobile-tests/${{ inputs.correlation_id }}
          title: "Generated mobile tests: ${{ inputs.correlation_id }}"
          commit-message: "Add generated Maestro flows"
          add-paths: |
            specs/*.md
            tests/generated-mobile/**
          body: |
            Automatically generated by the mobile test-generation pipeline (correlation id `${{ inputs.correlation_id }}`).

            Review carefully before merging — this includes any `# POSSIBLE REGRESSION` + `flagged-regression` tag flows the healer left, which mean the app's behavior may have changed rather than the flow being wrong.

      - name: Report completion
        env:
          CORRELATION_ID: ${{ inputs.correlation_id }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          BRANCH_NAME: generated-mobile-tests/${{ inputs.correlation_id }}
        run: node .github/scripts/report-generation-complete.js
