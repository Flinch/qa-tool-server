# scenario: Add two single-digit numbers
# spec: specs/mobile-mobile-smoke-android.md
appId: com.sec.android.app.popupcalculator
---
- launchApp:
    clearState: true
# 1. Tap "3"
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_03"
# 2. Tap "+"
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_add"
# 3. Tap "5"
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_05"
# 4. Tap "=" — result field shows 8
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_equal"
- assertVisible:
    id: "com.sec.android.app.popupcalculator:id/calc_edt_formula"
    text: "8.*"
