# scenario: TC-74: Add two single-digit numbers on the calculator
# spec: specs/tc-74-add-two-single-digit-numbers-on-the-calculator.md
appId: com.sec.android.app.popupcalculator
---
- launchApp:
    clearState: true
# 1. Tap "7"
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_07"
# 2. Tap "+"
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_add"
# 3. Tap "1"
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_01"
# 4. Tap "=" — result field shows a value starting with "8"
- tapOn:
    id: "com.sec.android.app.popupcalculator:id/calc_keypad_btn_equal"
- assertVisible:
    id: "com.sec.android.app.popupcalculator:id/calc_edt_formula"
    text: "8.*"
